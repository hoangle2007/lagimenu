version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: lagimenu-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: lagimenu
      POSTGRES_PASSWORD: Hoang2007@
      POSTGRES_DB: lagimenu
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
