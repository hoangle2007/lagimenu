<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kivo Menu</title>
  <meta name="description"
    content="Hệ thống menu số thông minh cho nhà hàng và quán cà phê. Khách quét QR, gọi món tức thì." />
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Kivo Menu" />
  <meta property="og:description"
    content="Hệ thống menu số thông minh cho nhà hàng và quán cà phê. Khách quét QR, gọi món tức thì." />
  <meta property="og:image" content="/logo.png" />
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:title" content="Kivo Menu" />
  <meta property="twitter:description"
    content="Hệ thống menu số thông minh cho nhà hàng và quán cà phê. Khách quét QR, gọi món tức thì." />
  <meta property="twitter:image" content="/logo.png" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- Firebase Messaging Service Worker — handles push notifications when app is closed -->
  <script src="/firebase-messaging-init.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('/firebase-messaging-sw.js')
          .then((reg) => {
            console.log('[SW] Firebase messaging service worker registered:', reg.scope);
          })
          .catch((err) => {
            console.warn('[SW] Service worker registration failed:', err);
          });
      });
    }
  </script>
</body>

</html>
